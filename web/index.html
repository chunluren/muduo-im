// ===== Unread Counts on Startup =====
async function loadUnreadCounts() {
  try {
    const data = await api('GET', '/api/unread');
    if (data && typeof data === 'object') {
      // data might be { success: true, unreads: { friend_1: 3, group_2: 5 } }
      // or it might be the unreads object directly
      const unreads = data.unreads || data;
      if (typeof unreads === 'object') {
        for (const key in unreads) {
          if (key === 'success' || key === 'message') continue;
          const count = parseInt(unreads[key]) || 0;
          if (count > 0) {
            unreadCounts[key] = count;
          }
        }
        renderFriendList();
        renderGroupList();
      }
    }
  } catch (e) {
    console.error('加载未读计数失败:', e);
  }
}

// ===== History Message Pagination =====
function setupScrollPagination() {
  const container = document.getElementById('chatMessages');
  container.addEventListener('scroll', onChatScroll);
}

async function onChatScroll() {
  const container = document.getElementById('chatMessages');
  if (container.scrollTop > 50) return; // Only trigger near top
  if (!currentChat) return;
  if (isLoadingHistory) return;
  const key = currentChat.type + '_' + currentChat.id;
  if (historyFullyLoaded[key]) return;

  const messages = messageCache[key] || [];
  if (messages.length === 0) return;

  // Get the oldest message timestamp
  const oldest = messages[0];
  if (!oldest || !oldest.timestamp) return;

  isLoadingHistory = true;
  const loadingEl = document.getElementById('historyLoading');
  loadingEl.classList.add('show');

  try {
    const param = currentChat.type === 'friend'
      ? 'peerId=' + currentChat.id
      : 'groupId=' + currentChat.id;
    const beforeTs = typeof oldest.timestamp === 'number' ? oldest.timestamp : parseInt(oldest.timestamp);
    const olderMessages = await api('GET', '/api/messages/history?' + param + '&before=' + beforeTs);

    if (!olderMessages || olderMessages.length === 0) {
      historyFullyLoaded[key] = true;
    } else {
      const parsed = olderMessages.map(m => ({
        msgId: m.msgId,
        from: m.from,
        to: m.to,
        content: m.content,
        fileUrl: m.fileUrl || m.url,
        filename: m.filename,
        fileSize: m.fileSize,
        recalled: m.recalled || false,
        read: m.read || false,
        replyTo: m.replyTo,
        timestamp: m.timestamp
      }));

      // Prepend to cache
      messageCache[key] = [...parsed, ...messages];

      // Remember scroll position, re-render, restore scroll
      const prevHeight = container.scrollHeight;
      renderMessages();
      const newHeight = container.scrollHeight;
      container.scrollTop = newHeight - prevHeight;

      if (parsed.length < 20) {
        historyFullyLoaded[key] = true;
      }
    }
  } catch (e) {
    console.error('加载更多消息失败:', e);
  } finally {
    isLoadingHistory = false;
    loadingEl.classList.remove('show');
  }
}

// ===== Utility =====
function escapeHtml(text) {
  if (text === null || text === undefined) return '';
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

// ===== Message Search =====
function toggleMsgSearch() {
  const input = document.getElementById('msgSearchInput');
  const results = document.getElementById('msgSearchResults');
  input.classList.toggle('show');
  if (input.classList.contains('show')) {
    input.focus();
  } else {
    input.value = '';
    results.classList.remove('show');
    results.innerHTML = '';
  }
}

function onMsgSearchInput() {
  if (msgSearchDebounceTimer) clearTimeout(msgSearchDebounceTimer);
  msgSearchDebounceTimer = setTimeout(doMsgSearch, 500);
}

async function doMsgSearch() {
  const keyword = document.getElementById('msgSearchInput').value.trim();
  const results = document.getElementById('msgSearchResults');
  if (keyword.length < 1) {
    results.classList.remove('show');
    results.innerHTML = '';
    return;
  }
  try {
    const data = await api('GET', '/api/messages/search?keyword=' + encodeURIComponent(keyword));
    results.innerHTML = '';
    const msgs = data.messages || data.results || data;
    if (Array.isArray(msgs) && msgs.length > 0) {
      msgs.forEach(m => {
        const li = document.createElement('li');
        li.className = 'msg-search-result-item';
        const fromName = m.fromName || m.senderName || ('用户' + m.from);
        li.innerHTML = `
          <div class="sr-from">${escapeHtml(fromName)}</div>
          <div class="sr-content">${escapeHtml(m.content || '')}</div>
          <div class="sr-time">${formatTime(m.timestamp)}</div>
        `;
        li.onclick = () => {
          // Navigate to the chat containing this message
          if (m.groupId) {
            const g = groups.find(g => g.groupId == m.groupId);
            selectChat('group', parseInt(m.groupId), g ? g.name : '群组' + m.groupId);
          } else {
            const peerId = m.from == userId ? m.to : m.from;
            const f = friends.find(f => f.userId == peerId);
            selectChat('friend', parseInt(peerId), f ? (f.nickname || f.username) : '用户' + peerId);
          }
          // Close search
          toggleMsgSearch();
        };
        results.appendChild(li);
      });
      results.classList.add('show');
    } else {
      results.innerHTML = '<li class="msg-search-result-item" style="cursor:default;color:#999;">无搜索结果</li>';
      results.classList.add('show');
    }
  } catch (e) {
    results.innerHTML = '<li class="msg-search-result-item" style="cursor:default;color:#e74c3c;">搜索失败: ' + escapeHtml(e.message) + '</li>';
    results.classList.add('show');
  }
}

// Close search results when clicking outside
document.addEventListener('click', function(e) {
  const wrapper = document.getElementById('msgSearchWrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    const input = document.getElementById('msgSearchInput');
    const results = document.getElementById('msgSearchResults');
    if (input.classList.contains('show')) {
      input.classList.remove('show');
      input.value = '';
      results.classList.remove('show');
      results.innerHTML = '';
    }
  }
});

// ===== Emoji Picker =====
const EMOJI_LIST = ['😀','😂','🤣','😊','😍','🥰','😘','😎','🤔','😢','😭','😡','🤮','👍','👎','❤️','🔥','💯','🎉','👏','🙏','💪','😱','🤯','🥳','😴','🤝','👀','✅'];

function toggleEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.classList.toggle('show');
}

function initEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  EMOJI_LIST.forEach(emoji => {
    const span = document.createElement('span');
    span.textContent = emoji;
    span.onclick = (e) => {
      e.stopPropagation();
      insertEmoji(emoji);
    };
    grid.appendChild(span);
  });
}

function insertEmoji(emoji) {
  const input = document.getElementById('msgInput');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.substring(0, start) + emoji + val.substring(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
  updateCharCounter();
  // Close picker after inserting
  document.getElementById('emojiPicker').classList.remove('show');
}

// Close emoji picker when clicking outside
document.addEventListener('click', function(e) {
  const picker = document.getElementById('emojiPicker');
  const btn = document.getElementById('btnEmoji');
  if (picker && btn && !picker.contains(e.target) && !btn.contains(e.target)) {

});

function findMessageById(msgId) {
  for (const key in messageCache) {
    const msgs = messageCache[key];
    for (let i = 0; i < msgs.length; i++) {
      if (msgs[i].msgId === msgId) return msgs[i];
    }
  }
  return null;
}

// ===== Group Management =====
async function loadGroupAnnouncement(groupId) {
  try {
    const data = await api('GET', '/api/groups/info?groupId=' + groupId);
    if (data.success || data.announcement !== undefined) {
      const ann = data.announcement || '';
      groupAnnouncements[groupId] = ann;
      if (currentChat && currentChat.type === 'group' && currentChat.id === groupId) {
        const bar = document.getElementById('groupAnnouncementBar');
        if (ann) {
          document.getElementById('groupAnnouncementText').textContent = ann;
          bar.classList.add('show');
        } else {
          bar.classList.remove('show');
        }
      }
    }
  } catch (e) {
    // Silently fail - announcement is optional
  }
}

function doLeaveGroupFromHeader() {
  if (!currentChat || currentChat.type !== 'group') return;
  doLeaveGroup(currentChat.id, currentChat.name);
}

async function openGroupManageModal() {
  if (!currentChat || currentChat.type !== 'group') return;
  const groupId = currentChat.id;
  document.getElementById('groupManageTitle').textContent = currentChat.name + ' - 群组管理';
  document.getElementById('groupAnnTextarea').value = groupAnnouncements[groupId] || '';

  // Load members
  const memberList = document.getElementById('groupMemberList');
  memberList.innerHTML = '<li style="padding:8px 0;color:#999;font-size:12px;">加载中...</li>';

  document.getElementById('groupManageModal').style.display = 'flex';

  try {
    const data = await api('GET', '/api/groups/members?groupId=' + groupId);
    const members = data.members || data;
    const group = groups.find(g => g.groupId === groupId);
    const ownerId = group ? group.ownerId : null;
    memberList.innerHTML = '';
    if (Array.isArray(members)) {
      members.forEach(m => {
        const li = document.createElement('li');
        li.className = 'member-item';
        const isOwner = m.userId == ownerId;
        const isSelf = m.userId == userId;
        li.innerHTML = `
          <span class="member-name">
            ${escapeHtml(m.nickname || m.username || '用户' + m.userId)}
            ${isOwner ? '<span class="owner-tag">(群主)</span>' : ''}
          </span>
          ${!isSelf && !isOwner ? '<button class="btn-kick" onclick="kickGroupMember(' + groupId + ',' + m.userId + ',this)">踢出</button>' : ''}
        `;
        memberList.appendChild(li);
      });
    }
  } catch (e) {
    memberList.innerHTML = '<li style="padding:8px 0;color:#e74c3c;font-size:12px;">加载成员失败</li>';
  }
}

function closeGroupManageModal() {
  document.getElementById('groupManageModal').style.display = 'none';
}

async function saveGroupAnnouncement() {
  if (!currentChat || currentChat.type !== 'group') return;
  const groupId = currentChat.id;
  const ann = document.getElementById('groupAnnTextarea').value.trim();
  try {
    const data = await api('POST', '/api/groups/announcement', { groupId, announcement: ann });
    if (data.success) {
      groupAnnouncements[groupId] = ann;
      const bar = document.getElementById('groupAnnouncementBar');
      if (ann) {
        document.getElementById('groupAnnouncementText').textContent = ann;
        bar.classList.add('show');
      } else {
        bar.classList.remove('show');
      }
      alert('公告已保存');
    } else {
      alert(data.message || '保存失败');
    }
  } catch (e) {
    alert('保存公告失败: ' + e.message);
  }
}

async function kickGroupMember(groupId, memberUserId, btn) {
  if (!confirm('确认踢出该成员?')) return;
  try {
    btn.disabled = true;
    btn.textContent = '踢出中...';
    const data = await api('POST', '/api/groups/kick', { groupId, userId: memberUserId });
    if (data.success) {
      btn.closest('.member-item').remove();
    } else {
      alert(data.message || '踢出失败');
      btn.disabled = false;
      btn.textContent = '踢出';
    }
  } catch (e) {
    alert('踢出失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '踢出';
  }
}
