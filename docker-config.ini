# muduo-im 配置文件 (Docker Compose 部署)
# 使用 service 名称连接 MySQL / Redis 而非 127.0.0.1

# MySQL
mysql.host = mysql
mysql.port = 3306
mysql.user = root
mysql.password =
mysql.database = muduo_im
mysql.pool_min = 5
mysql.pool_max = 20

# Redis
redis.host = redis
redis.port = 6379
redis.password =
redis.pool_min = 3
redis.pool_max = 10

# Server
server.http_port = 8080
server.ws_port = 9090
# JWT secret 通常通过环境变量 MUDUO_IM_JWT_SECRET 注入，留空让代码走默认回退
server.jwt_secret =

# 异步日志
# log_level: 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=FATAL
server.log_file = /app/logs/muduo-im.log
server.log_level = 1
