# muduo-im 配置文件

# MySQL
mysql.host = 127.0.0.1
mysql.port = 3306
mysql.user = root
mysql.password =
mysql.database = muduo_im
mysql.pool_min = 5
mysql.pool_max = 20

# Redis
redis.host = 127.0.0.1
redis.port = 6379
redis.password =
redis.pool_min = 3
redis.pool_max = 10

# Server
server.http_port = 8080
server.ws_port = 9090
server.jwt_secret = muduo-im-jwt-secret-key

# Log level: 0=INFO, 1=DEBUG, 2=ERROR, 3=FATAL
server.log_level = 2
