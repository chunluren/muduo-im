# muduo-im 配置文件

# MySQL
mysql.host = 127.0.0.1
mysql.port = 3306
mysql.user = root
mysql.password =
mysql.database = muduo_im
mysql.pool_min = 5
mysql.pool_max = 20

# Redis
redis.host = 127.0.0.1
redis.port = 6379
redis.password =
redis.pool_min = 3
redis.pool_max = 10

# Server
server.http_port = 8080
server.ws_port = 9090
server.jwt_secret = muduo-im-jwt-secret-key

# 异步日志配置（AsyncLogger，双缓冲，不阻塞业务线程）
# log_level: 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=FATAL
server.log_level = 1
server.log_file = muduo-im.log
