# Phase 5: Kafka MirrorMaker 2 单向复制 az1 → az2
#
# 把 az1 的 im.* topic 镜像到 az2 集群。az2 -> az1 不复制（避免双向写冲突）。
#
# 启动（在 az1 任意一台 broker 主机或独立 mm2 主机上）：
#   bin/connect-mirror-maker.sh deploy/multi-az/mm2.properties
#
# 镜像后 az2 上看到的 topic 名是 "az1.im.messages"（前缀规则可改）。
# Consumer 跨集群读时用 RemoteClusterUtils.translateOffsets 自动转 offset。

clusters = az1, az2

# 每个集群的 bootstrap（实际部署填真实 broker 列表）
az1.bootstrap.servers = kafka-az1-1:9092,kafka-az1-2:9092,kafka-az1-3:9092
az2.bootstrap.servers = kafka-az2-1:9092,kafka-az2-2:9092,kafka-az2-3:9092

# 单向：只从 az1 拉数据写到 az2
az1->az2.enabled = true
az1->az2.topics = im\..*
az1->az2.groups = .*

az2->az1.enabled = false

# 内部 topic 副本数（mm2 自己用的 heartbeat / checkpoint / offset-syncs topic）
replication.factor = 3
checkpoints.topic.replication.factor = 3
heartbeats.topic.replication.factor = 3
offset-syncs.topic.replication.factor = 3

# 性能
tasks.max = 4
producer.acks = all
producer.compression.type = snappy
producer.enable.idempotence = true
producer.max.in.flight.requests.per.connection = 5
producer.retries = 2147483647
producer.delivery.timeout.ms = 120000

# Source connector 拉取
source.cluster.alias = az1
target.cluster.alias = az2
emit.checkpoints.enabled = true
emit.heartbeats.enabled = true
sync.topic.acls.enabled = false
refresh.topics.interval.seconds = 30
refresh.groups.interval.seconds = 60
