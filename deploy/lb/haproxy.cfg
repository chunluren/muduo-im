# Phase 4.3: haproxy 放在 2 个 gateway 前面做 ws 接入 LB
#
# 策略：
#   - mode tcp（ws 是长连接、不要 LB 拆 HTTP；mode tcp 最透明）
#   - balance leastconn（活跃连接数最少的优先；ws 长连接合适）
#   - check inter 2s fall 3 rise 2（6s 判挂、4s 判活）
#
# 跑：
#   sudo systemctl stop haproxy   # 停掉系统默认那个
#   haproxy -f deploy/lb/haproxy.cfg -D -p /tmp/im-haproxy.pid
# 停：
#   kill $(cat /tmp/im-haproxy.pid)

global
    daemon
    maxconn 100000
    log /dev/log local0
    stats socket /tmp/im-haproxy.sock mode 660 level admin

defaults
    mode tcp
    log global
    option dontlognull
    timeout connect 5s
    timeout client  600s        # ws 是长连接；600s 比 idle 心跳长
    timeout server  600s
    timeout queue   30s
    retries 3

frontend stats_ui
    mode http
    bind *:7777
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE        # local-only，方便 enable/disable server

# Phase 5b.6: Prometheus exporter（haproxy 2.0+ 内置）
# Prometheus 抓 http://localhost:8404/metrics
# 关键指标：haproxy_backend_status (= UP/DOWN)，haproxy_server_status，
#          haproxy_server_check_failures_total
frontend prometheus
    mode http
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    no log

frontend ws_front
    bind *:9090
    default_backend ws_gateways

backend ws_gateways
    balance leastconn
    # Phase 5b: HTTP /health 探活，支持 graceful drain（gateway SIGTERM →
    # /health 立刻 503 → haproxy 在 fall=3 个周期内（6s）摘掉它，新连接走另一台）
    option httpchk GET /health
    http-check expect status 200
    # ws 走 9091/9192；健康检查走 9081/9182（独立 port，避开 ws upgrade）
    server gw-A 127.0.0.1:9091 check port 9081 inter 2s fall 3 rise 2
    server gw-B 127.0.0.1:9192 check port 9182 inter 2s fall 3 rise 2
