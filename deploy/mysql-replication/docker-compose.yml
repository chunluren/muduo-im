# Phase 4.4 MySQL master + 2 replica + 半同步复制（async fallback）
#
# 启：
#   docker compose -f deploy/mysql-replication/docker-compose.yml up -d
#   bash deploy/mysql-replication/init-replication.sh
#
# 演练：
#   bash deploy/mysql-replication/failover_drill.sh
#
# 端口：
#   master   3306
#   replica1 3307
#   replica2 3308

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --rpl-semi-sync-master-enabled=ON
      - --rpl-semi-sync-master-timeout=1000
      - --rpl-semi-sync-master-wait-for-slave-count=1
      - --plugin-load=rpl_semi_sync_master=semisync_master.so;rpl_semi_sync_slave=semisync_slave.so
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: muduo_im
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ../../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql-replica-1:
    image: mysql:8.0
    container_name: mysql-replica-1
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --relay-log=mysql-relay
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
      - --super-read-only=ON
      - --rpl-semi-sync-slave-enabled=ON
      - --plugin-load=rpl_semi_sync_master=semisync_master.so;rpl_semi_sync_slave=semisync_slave.so
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql_replica1_data:/var/lib/mysql
    depends_on:
      mysql-master:
        condition: service_healthy

  mysql-replica-2:
    image: mysql:8.0
    container_name: mysql-replica-2
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --relay-log=mysql-relay
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --read-only=ON
      - --super-read-only=ON
      - --rpl-semi-sync-slave-enabled=ON
      - --plugin-load=rpl_semi_sync_master=semisync_master.so;rpl_semi_sync_slave=semisync_slave.so
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica2_data:/var/lib/mysql
    depends_on:
      mysql-master:
        condition: service_healthy

volumes:
  mysql_master_data:
  mysql_replica1_data:
  mysql_replica2_data:
