# Phase 5b.6 Prometheus 抓取配置
#
# 把 muduo-im 业务进程 + 各基础设施 exporter 全部抓进来。
# 启动：bash deploy/observability/up.sh
# 访问：http://127.0.0.1:9090

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: muduo-im

# ─────────────────────────────────────────────────────────────
# 抓哪些 target
# ─────────────────────────────────────────────────────────────
scrape_configs:
  # 0. Prometheus 自身
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  # 1. 应用：muduo-im chat server（HttpServer.enableMetrics）
  #    会暴露 chat_worker_pool_*, chat_online_users,
  #    redis_sentinel_master_switches_total, http_requests_total
  - job_name: muduo-im-server
    static_configs:
      - targets: ['127.0.0.1:8080']
        labels: { instance: 'chat-server-A' }
    metrics_path: /metrics

  # 2. gateway —— 当前 /health 而非 /metrics（5b.2）。这里留 placeholder：
  #    将来 gateway 加 /metrics 时直接放开。
  # - job_name: muduo-im-gateway
  #   static_configs:
  #     - targets: ['127.0.0.1:9081', '127.0.0.1:9182']
  #   metrics_path: /metrics

  # 3. haproxy（5b.6 内置 prometheus-exporter 在 :8404）
  - job_name: haproxy
    static_configs:
      - targets: ['127.0.0.1:8404']
    metrics_path: /metrics

  # 4. etcd 自带 /metrics
  - job_name: etcd
    static_configs:
      - targets: ['127.0.0.1:2379']
    metrics_path: /metrics

  # 5. node_exporter（机器层指标：cpu/mem/disk/net）
  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']

  # 6. redis_exporter（连本机 6379；sentinel 模式下会自动发现 master/replicas）
  - job_name: redis
    static_configs:
      - targets: ['127.0.0.1:9121']

  # 7. mysqld_exporter
  - job_name: mysql
    static_configs:
      - targets: ['127.0.0.1:9104']

  # 8. kafka_exporter（tarball 安装，见 up.sh）
  - job_name: kafka
    static_configs:
      - targets: ['127.0.0.1:9308']
