# Alertmanager 配置 (Phase 5b.6 末)
# 默认走 webhook (httpbin) 演示路径；生产替换 receiver 即可。
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: default

  routes:
    # critical 路由额外推一份（占位：可改成 PagerDuty / OnCall webhook）
    - matchers:
        - severity = critical
      receiver: critical
      continue: true

receivers:
  - name: default
    webhook_configs:
      - url: http://127.0.0.1:9099/webhook
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: http://127.0.0.1:9099/critical
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity = critical]
    target_matchers: [severity = warning]
    equal: ['alertname', 'instance']
