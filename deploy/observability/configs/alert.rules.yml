# Phase 5b.6 告警规则 — 5 类核心
# Prometheus 加载 → alertmanager 路由 → receiver
groups:
  - name: muduo-im
    rules:
      # 1. 任何 target 持续 1m 抓不到
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }}/{{ $labels.instance }} is down"
          description: "Prometheus 抓不到 {{ $labels.job }} 实例 {{ $labels.instance }} 超过 1 分钟。"

      # 2. 业务队列堆积
      - alert: ChatWorkerQueueFull
        expr: chat_worker_pool_pending_tasks > 5000
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "chat worker pool pending = {{ $value }}"
          description: "ChatServer worker 队列堆积，可能在 drop 任务。看 chat_worker_pool_dropped_tasks 速率。"

      # 3. Kafka consumer lag 过高
      - alert: KafkaConsumerLagHigh
        expr: sum by (consumergroup) (kafka_consumergroup_lag) > 10000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "kafka group {{ $labels.consumergroup }} lag = {{ $value }}"

      # 4. Redis 主切换太频繁（脑裂 / 网络抖）
      - alert: RedisMasterChurning
        expr: increase(redis_sentinel_master_switches_total[10m]) >= 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis sentinel 在 10 分钟内 failover {{ $value }} 次"

      # 5. MySQL replica 同步延迟
      - alert: MySQLReplicaLagHigh
        expr: mysql_slave_status_seconds_behind_master > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} replica lag = {{ $value }}s"

      # 6. gateway 大量 RPC unavailable（logic 端在出问题）
      - alert: GatewayLogicRpcUnavailable
        expr: rate(gateway_logic_rpc_unavailable_total[1m]) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "gateway {{ $labels.instance }} 看到 logic UNAVAILABLE 速率 = {{ $value }}/s"

      # 7. gateway 在 drain（SIGTERM 触发）—— 不一定是问题，但提醒值班
      - alert: GatewayDraining
        expr: gateway_draining == 1
        for: 30s
        labels:
          severity: info
        annotations:
          summary: "gateway {{ $labels.instance }} 正在优雅下线"
